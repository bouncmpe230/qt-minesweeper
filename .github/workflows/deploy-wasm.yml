name: Deploy Qt WebAssembly

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Qt for WebAssembly
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.2"
          host: "linux"
          target: "desktop"
          arch: "wasm_singlethread"
          cache: true

      - name: Configure project
        run: qt-cmake -S . -B build-wasm -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build-wasm --parallel

      - name: Collect web files
        run: |
          mkdir -p dist
          cp build-wasm/minesweeper.html dist/index.html
          cp build-wasm/minesweeper.js dist/
          cp build-wasm/minesweeper.wasm dist/
          if [ -f build-wasm/minesweeper.worker.js ]; then cp build-wasm/minesweeper.worker.js dist/; fi
          if [ -f build-wasm/minesweeper.data ]; then cp build-wasm/minesweeper.data dist/; fi
          if [ -f build-wasm/qtloader.js ]; then cp build-wasm/qtloader.js dist/; fi
          if [ -f build-wasm/qtlogo.svg ]; then cp build-wasm/qtlogo.svg dist/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
